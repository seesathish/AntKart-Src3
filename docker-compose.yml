version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: antcart-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8090:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/antkart || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:latest
    container_name: antcart-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: AKProductsDb

  ak-products-api:
    image: ak-products-api
    build:
      context: .
      dockerfile: AK.Products/AK.Products.API/Dockerfile
    container_name: ak-products-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=AKProductsDb
      - MongoDbSettings__ProductsCollection=Products
      - DiscountGrpc__Address=http://ak-discount-grpc:8080
      - Keycloak__Authority=http://keycloak:8080/realms/antkart
      - Keycloak__Audience=antkart-client
      - Keycloak__RequireHttpsMetadata=false
      - Keycloak__AdminUrl=http://keycloak:8080
      - Keycloak__Realm=antkart
      - Keycloak__ClientId=antkart-client
      - Keycloak__ClientSecret=antkart-secret
    depends_on:
      - mongodb
      - keycloak
      - ak-discount-grpc

  ak-discount-grpc:
    image: ak-discount-grpc
    build:
      context: .
      dockerfile: AK.Discount/AK.Discount.Grpc/Dockerfile
    container_name: ak-discount-grpc
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DiscountDb=Data Source=/app/data/discount.db
    volumes:
      - discount_data:/app/data
    depends_on:
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: antcart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  ak-shoppingcart-api:
    image: ak-shoppingcart-api
    build:
      context: .
      dockerfile: AK.ShoppingCart/AK.ShoppingCart.API/Dockerfile
    container_name: ak-shoppingcart-api
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RedisSettings__ConnectionString: "redis:6379"
      RedisSettings__InstanceName: "AKCart:"
      RedisSettings__CartExpiryDays: "30"
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
    depends_on:
      - redis
      - keycloak

  postgres:
    image: postgres:16-alpine
    container_name: antcart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AKOrdersDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ak-order-api:
    image: ak-order-api
    build:
      context: .
      dockerfile: AK.Order/AK.Order.API/Dockerfile
    container_name: ak-order-api
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=AKOrdersDb;Username=postgres;Password=postgres"
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
    depends_on:
      - postgres
      - keycloak

  ak-useridentity-api:
    image: ak-useridentity-api
    build:
      context: .
      dockerfile: AK.UserIdentity/AK.UserIdentity.API/Dockerfile
    container_name: ak-useridentity-api
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  mongodb_data:
  discount_data:
  postgres_data:
