services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: antkart-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8090:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null && echo ok"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:latest
    container_name: antkart-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: AKProductsDb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  ak-products-api:
    image: ak-products-api
    build:
      context: .
      dockerfile: AK.Products/AK.Products.API/Dockerfile
    container_name: antkart-products-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - SEED_DATABASE=true
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=AKProductsDb
      - MongoDbSettings__ProductsCollection=Products
      - DiscountGrpc__Address=http://ak-discount-grpc:8080
      - Keycloak__Authority=http://keycloak:8080/realms/antkart
      - Keycloak__Audience=antkart-client
      - Keycloak__RequireHttpsMetadata=false
      - Keycloak__AdminUrl=http://keycloak:8080
      - Keycloak__Realm=antkart
      - Keycloak__ClientId=antkart-client
      - Keycloak__ClientSecret=antkart-secret
      - RabbitMq__Host=rabbitmq
      - RabbitMq__VirtualHost=/
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Elasticsearch__Url=http://elasticsearch:9200
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      ak-discount-grpc:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ak-discount-grpc:
    image: ak-discount-grpc
    build:
      context: .
      dockerfile: AK.Discount/AK.Discount.Grpc/Dockerfile
    container_name: antkart-discount-grpc
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DiscountDb=Data Source=/app/data/discount.db
    volumes:
      - discount_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: antkart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  ak-shoppingcart-api:
    image: ak-shoppingcart-api
    build:
      context: .
      dockerfile: AK.ShoppingCart/AK.ShoppingCart.API/Dockerfile
    container_name: antkart-shoppingcart-api
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RedisSettings__ConnectionString: "redis:6379"
      RedisSettings__InstanceName: "AKCart:"
      RedisSettings__CartExpiryDays: "30"
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Elasticsearch__Url: "http://elasticsearch:9200"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: antkart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AKOrdersDb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5

  ak-order-api:
    image: ak-order-api
    build:
      context: .
      dockerfile: AK.Order/AK.Order.API/Dockerfile
    container_name: antkart-order-api
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=AKOrdersDb;Username=postgres;Password=postgres"
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Elasticsearch__Url: "http://elasticsearch:9200"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ak-payments-api:
    image: ak-payments-api
    build:
      context: .
      dockerfile: AK.Payments/AK.Payments.API/Dockerfile
    container_name: antkart-payments-api
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PaymentsDb: "Host=postgres;Port=5432;Database=AKPaymentsDb;Username=postgres;Password=postgres"
      Razorpay__KeyId: "rzp_test_SfDi8y9YJGd7DF"
      Razorpay__KeySecret: "iJiuTafS42VfKLES4gOvPjLV"
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__VirtualHost: "/"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Elasticsearch__Url: "http://elasticsearch:9200"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ak-useridentity-api:
    image: ak-useridentity-api
    build:
      context: .
      dockerfile: AK.UserIdentity/AK.UserIdentity.API/Dockerfile
    container_name: antkart-useridentity-api
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Keycloak__Authority: "http://keycloak:8080/realms/antkart"
      Keycloak__Audience: "antkart-client"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminUrl: "http://keycloak:8080"
      Keycloak__Realm: "antkart"
      Keycloak__ClientId: "antkart-client"
      Keycloak__ClientSecret: "antkart-secret"
      Elasticsearch__Url: "http://elasticsearch:9200"
    depends_on:
      keycloak:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: antkart-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: antkart-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: antkart-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy

  ak-gateway-api:
    image: ak-gateway-api
    build:
      context: .
      dockerfile: AK.Gateway/AK.Gateway.API/Dockerfile
    container_name: antkart-gateway-api
    restart: unless-stopped
    ports:
      - "9090:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8000
      - Keycloak__Authority=http://keycloak:8080/realms/antkart
      - Keycloak__Audience=antkart-client
      - Keycloak__RequireHttpsMetadata=false
      - Keycloak__AdminUrl=http://keycloak:8080
      - Keycloak__Realm=antkart
      - Keycloak__ClientId=antkart-client
      - Keycloak__ClientSecret=antkart-secret
      - Elasticsearch__Url=http://elasticsearch:9200
    depends_on:
      keycloak:
        condition: service_healthy
      ak-products-api:
        condition: service_started
      ak-shoppingcart-api:
        condition: service_started
      ak-order-api:
        condition: service_started
      ak-useridentity-api:
        condition: service_started
      ak-payments-api:
        condition: service_started

volumes:
  mongodb_data:
  discount_data:
  postgres_data:
  rabbitmq_data:
  elasticsearch_data:
