syntax = "proto3";
option csharp_namespace = "AK.Discount.Grpc";
package discount;

service DiscountProtoService {
    rpc GetDiscount (GetDiscountRequest) returns (CouponModel);
    rpc CreateDiscount (CreateDiscountRequest) returns (CouponModel);
    rpc UpdateDiscount (UpdateDiscountRequest) returns (CouponModel);
    rpc DeleteDiscount (DeleteDiscountRequest) returns (DeleteDiscountResponse);
    rpc GetAllDiscounts (GetAllDiscountsRequest) returns (GetAllDiscountsResponse);
}

message GetDiscountRequest { string product_id = 1; }

message CouponModel {
    int32 id = 1;
    string product_id = 2;
    string product_name = 3;
    string coupon_code = 4;
    string description = 5;
    double amount = 6;
    string discount_type = 7;
    string valid_from = 8;
    string valid_to = 9;
    bool is_active = 10;
    int32 minimum_quantity = 11;
}

message CreateDiscountRequest { CouponModel coupon = 1; }
message UpdateDiscountRequest { int32 id = 1; CouponModel coupon = 2; }
message DeleteDiscountRequest { int32 id = 1; }
message DeleteDiscountResponse { bool success = 1; }
message GetAllDiscountsRequest { int32 page = 1; int32 page_size = 2; }
message GetAllDiscountsResponse { repeated CouponModel coupons = 1; int32 total_count = 2; }
