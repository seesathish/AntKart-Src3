# AK.Gateway.API — Ocelot API gateway. Routes to the ak-* REST services.
name: ak-gateway
serviceName: gateway
workloadIdentityClientId: "a2b00f18-e8ff-4ab0-a399-5b194a2f05e1"

env:
  # Microsoft Entra ID JWT validation at the edge (AddEntraAuthentication binds the Entra section).
  Entra__Instance: "https://login.microsoftonline.com"
  Entra__TenantId: "4cacc56a-0d38-46c4-ba20-429d51d7b449"
  Entra__Audience: "api://antkart-api-dev"
  Entra__ClientId: "ea22550b-a0ae-4847-a2e2-2524752d9522"

# Ingress — the gateway is the ONLY service exposed externally. Enabled at upgrade
# time (kept false here so a plain install does not create it before the controller
# and its public IP exist):
#   helm upgrade ak-gateway ... --set ingress.enabled=true --set ingress.host=<ip>.nip.io
ingress:
  enabled: false
  className: nginx
  path: /
  pathType: Prefix
  # Start on STAGING to validate the whole flow (Let's Encrypt PRODUCTION has strict
  # rate limits — a failed loop can lock the account out for a week). Switch to
  # letsencrypt-prod only after staging issues a certificate successfully.
  clusterIssuer: letsencrypt-staging
  annotations:
    # Max request body the gateway will accept (nginx default is 1m). 10m leaves room
    # for larger POST/PUT payloads without a 413.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Upstream read/send timeouts in seconds — how long nginx waits on the gateway.
    # 60s matches Ocelot's own per-route QoS TimeoutValue (10s) with headroom.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Force HTTP -> HTTPS. nginx does this by default once a TLS block is present;
    # set explicitly so the intent is obvious and survives controller defaults changing.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

# ocelot.json is mounted from a ConfigMap over /app/ocelot.json so downstream
# routing changes need only a values edit + `helm upgrade` (no image rebuild).
# Downstream hosts are the in-cluster ak-* Service names on port 8080.
ocelot:
  enabled: true
  config:
    Routes:
      - UpstreamPathTemplate: "/gateway/products/{everything}"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/v1/products/{everything}"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-products", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 20 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 5, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/products"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/v1/products"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-products", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 20 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 5, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/cart/{everything}"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/v1/cart/{everything}"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-cart", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 10 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 3, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/orders/{everything}"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/orders/{everything}"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-order", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 10 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 3, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/orders"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/orders"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-order", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 10 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 3, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/payments/{everything}"
        UpstreamHttpMethod: ["GET", "POST", "PUT", "DELETE"]
        DownstreamPathTemplate: "/api/payments/{everything}"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-payments", Port: 8080 }
        AuthenticationOptions: { AuthenticationProviderKey: "Bearer" }
        RateLimitOptions: { EnableRateLimiting: true, Period: "1s", PeriodTimespan: 1, Limit: 30 }
        QoSOptions: { ExceptionsAllowedBeforeBreaking: 5, DurationOfBreak: 30000, TimeoutValue: 10000 }
      - UpstreamPathTemplate: "/gateway/health/products"
        UpstreamHttpMethod: ["GET"]
        DownstreamPathTemplate: "/health"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-products", Port: 8080 }
      - UpstreamPathTemplate: "/gateway/health/cart"
        UpstreamHttpMethod: ["GET"]
        DownstreamPathTemplate: "/health"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-cart", Port: 8080 }
      - UpstreamPathTemplate: "/gateway/health/orders"
        UpstreamHttpMethod: ["GET"]
        DownstreamPathTemplate: "/health"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-order", Port: 8080 }
      - UpstreamPathTemplate: "/gateway/health/payments"
        UpstreamHttpMethod: ["GET"]
        DownstreamPathTemplate: "/health"
        DownstreamScheme: "http"
        DownstreamHostAndPorts:
          - { Host: "ak-payments", Port: 8080 }
    GlobalConfiguration:
      # Interim internal base URL; replaced with the external URL when ingress is added.
      BaseUrl: "http://ak-gateway:8080"
      RateLimitOptions:
        DisableRateLimitHeaders: false
        QuotaExceededMessage: "Rate limit exceeded. Please slow down."
        HttpStatusCode: 429
