# AK.Products.API — REST catalogue (Cosmos DB via MongoDB API).
name: ak-products
serviceName: products
workloadIdentityClientId: "c2f1d5e5-fe15-48bd-b75f-d7e820e9c687"

env:
  # CRITICAL: override the localhost:5001 default with the in-cluster Discount DNS.
  # No trailing slash, matching the appsettings default form (http://localhost:5001).
  DiscountGrpc__Address: "http://ak-discount:8080"
  ServiceBus__FullyQualifiedNamespace: "sb-antkart-dev.servicebus.windows.net"
  MongoDbSettings__DatabaseName: "antkart-products"
  MongoDbSettings__ProductsCollection: "products"
  Seeding__RunOnStartup: "false"
  # Microsoft Entra ID JWT validation (AddEntraAuthentication binds the Entra section).
  Entra__Instance: "https://login.microsoftonline.com"
  Entra__TenantId: "4cacc56a-0d38-46c4-ba20-429d51d7b449"
  Entra__Audience: "api://antkart-api-dev"
  Entra__ClientId: "ea22550b-a0ae-4847-a2e2-2524752d9522"
