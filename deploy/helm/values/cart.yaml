# AK.ShoppingCart.API — REST cart (Redis).
name: ak-cart
serviceName: cart
# In-cluster identity stays "cart" (ServiceAccount ak-cart, matching the federated
# identity subject), but the published ACR repository is antkart/shoppingcart, so
# the image path is overridden here. See antkart-service/values.yaml for the rationale.
image:
  name: shoppingcart
workloadIdentityClientId: "53d89789-5bfa-4bd8-b0ee-9ca382834a22"

env:
  ServiceBus__FullyQualifiedNamespace: "sb-antkart-dev.servicebus.windows.net"
  RedisSettings__InstanceName: "AKCart:"
  RedisSettings__CartExpiryDays: "30"
  # RedisSettings:ConnectionString is a secret (carries the access key) and is
  # resolved from Key Vault at runtime — it is NOT set here.
  # Microsoft Entra ID JWT validation (AddEntraAuthentication binds the Entra section).
  Entra__Instance: "https://login.microsoftonline.com"
  Entra__TenantId: "4cacc56a-0d38-46c4-ba20-429d51d7b449"
  Entra__Audience: "api://antkart-api-dev"
  Entra__ClientId: "ea22550b-a0ae-4847-a2e2-2524752d9522"
