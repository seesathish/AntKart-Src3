apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "antkart-service.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "antkart-service.labels" . | nindent 4 }}
    # Enables the workload-identity mutating webhook to act on this account.
    azure.workload.identity/use: "true"
  annotations:
    # The user-assigned managed identity federated to this service (id-ak-<service>-dev).
    # Value comes from values (workloadIdentityClientId) — never hardcoded.
    azure.workload.identity/client-id: {{ required "values.workloadIdentityClientId is required" .Values.workloadIdentityClientId | quote }}
